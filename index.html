    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    <script>
      // Workaround for libraries (like @google/genai) trying to overwrite window.fetch
      const originalFetch = window.fetch;
      if (originalFetch) {
        try {
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: (val) => { 
                console.warn('Intercepted attempt to overwrite window.fetch'); 
            },
            configurable: true
          });
        } catch (e) {
          console.error('Failed to redefine window.fetch setter', e);
        }
      }
    </script>
